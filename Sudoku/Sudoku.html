<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Sudoku</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h2>Sudoku</h2>

    <div class="controls">
        <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
        </select>
        <button onclick="newGame()">New Game</button>
    </div>

    <div id="grid"></div>

    <div class="numpad">
        <div class="num-btn" onclick="selectNumber(1)">1</div>
        <div class="num-btn" onclick="selectNumber(2)">2</div>
        <div class="num-btn" onclick="selectNumber(3)">3</div>
        <div class="num-btn" onclick="selectNumber(4)">4</div>
        <div class="num-btn" onclick="selectNumber(5)">5</div>
        <div class="num-btn" onclick="selectNumber(6)">6</div>
        <div class="num-btn" onclick="selectNumber(7)">7</div>
        <div class="num-btn" onclick="selectNumber(8)">8</div>
        <div class="num-btn" onclick="selectNumber(9)">9</div>
        <div class="num-btn" onclick="selectNumber(0)" style="background: #eee;">⌫</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
